<html lang="en">

      <symbol id="pencil-square" viewBox="0 0 16 16">
        <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
        <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
      </symbol>
    </svg>
    <div class="container p-0 position-relative">
      <div class="dropdown position-absolute mt-2">
        <button id="bd-theme" class="btn btn-secondary dropdown-toggle icon-link" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Toggle theme">
          <svg class="bi my-1 theme-icon-active" aria-hidden="true"><use href="#moon-stars-fill"></use></svg>
          <span class="d-none ms-2" id="bd-theme-text">Toggle theme</span>
        </button>
        <ul class="dropdown-menu" aria-labelledby="bd-theme-text">
          <li><button type="button" class="dropdown-item icon-link" data-bs-theme-value="light" aria-pressed="false">
            <svg class="bi me-2 opacity-50" aria-hidden="true"><use href="#sun-fill"></use></svg>
            Light
          </button></li>
          <li><button type="button" class="dropdown-item icon-link" data-bs-theme-value="dark" aria-pressed="true">
            <svg class="bi me-2 opacity-50" aria-hidden="true"><use href="#moon-stars-fill"></use></svg>
            Dark
          </button></li>
          <li><button type="button" class="dropdown-item icon-link" data-bs-theme-value="auto" aria-pressed="false">
            <svg class="bi me-2 opacity-50" aria-hidden="true"><use href="#circle-half"></use></svg>
            Auto
          </button></li>
        </ul>
      </div>
      <h1 id="logo-light" class="d-none text-center"><a href="/"><img src="/static/img/logo.png" alt="NoteCata"></a></h1>
      <h1 id="logo-dark" class="d-block text-center"><a href="/"><img src="/static/img/logo_dark.png" alt="NoteCata"></a></h1>
      <a id="github-button" class="icon-link icon-link-hover fs-1 position-absolute top-0 end-0 mt-2" title="GitHub" style="--bs-icon-link-transform: translate3d(0, -.125rem, 0);" href="https://github.com/evgenyvas/notecata" target="_blank">
        <svg class="bi theme-icon-active" aria-hidden="true"><use href="#github"></use></svg>
      </a>
      <div class="card">
        <div class="card-body">
          <h3>Notes Catalogue</h3>
          {{block "content" .}} No data found {{end}}
        </div>
        <div class="card-footer text-end">
          <small class="text-body-secondary">NoteCata v.0.0.1</small>
        </div>
      </div>
      <script src="/static/js/bootstrap.bundle.min.js"></script>
      <script src="/static/js/script.js"></script>
    </div>
  </body>
</html>
{{end}}
